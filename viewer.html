<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sombra Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f1a; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #error { display: none; position: absolute; inset: 0; color: #e8e8f0; font-family: monospace; font-size: 14px; padding: 2rem; white-space: pre-wrap; background: #0f0f1a; }
    </style>
  </head>
  <body>
    <canvas id="viewer"></canvas>
    <div id="error"></div>
    <script type="module" src="/src/viewer.ts"></script>
  </body>
</html>
